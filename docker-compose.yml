version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: deployments/backend.Dockerfile
      args:
        VERSION: ${VERSION:-0.0.0-dev}
        GIT_SHA: ${GIT_SHA:-dev}
        BUILD_DATE: ${BUILD_DATE:-}
    env_file:
      - ./backend/.env.docker
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./data/accessvault.db
    volumes:
      - ./data:/app/data
    ports:
      - "8005:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: deployments/frontend.Dockerfile
      args:
        VERSION: ${VERSION:-0.0.0-dev}
        GIT_SHA: ${GIT_SHA:-dev}
        BUILD_DATE: ${BUILD_DATE:-}
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

